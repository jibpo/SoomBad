<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>โจ๋เรนเจอร์ On Court</title>

<style>

body{
font-family:Arial;
background:#1f3a2e;
color:white;
padding:20px;
margin:0;
}

h1{
text-align:center;
}

.card{
background:#2c3b30;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

textarea{
width:100%;
height:120px;
font-size:18px;
}

button{
width:100%;
padding:14px;
margin-top:8px;
border:none;
border-radius:8px;
font-size:16px;
}

.start{background:#e6d3a3;}
.next{background:#6d9c6a;color:white;}
.save{background:#c07a2a;color:white;}
.shuffle{background:#3b82f6;color:white;}
.reset{background:#a53c3c;color:white;}
.view{background:#666;color:white;}

.big{
font-size:30px;
text-align:center;
margin:10px;
}

.vs{
text-align:center;
}

.score{
display:flex;
gap:10px;
}

.score input{
width:50%;
height:60px;
font-size:30px;
text-align:center;
}

.history{
background:#3a5245;
padding:10px;
border-radius:10px;
margin-top:5px;
}

</style>
</head>

<body>

<h1>🏸 โจ๋เรนเจอร์ On Court</h1>

<div class="card">

<textarea id="players" placeholder="ใส่ชื่อ 8 คน (บรรทัดละ 1 คน)"></textarea>

<button class="start" onclick="startGame()">เริ่มเกม</button>
<button class="next" onclick="nextRound()">รอบถัดไป</button>
<button class="reset" onclick="resetAll()">รีเซ็ต</button>

</div>

<div class="card">

<div id="round">ยังไม่เริ่มเกม</div>

<div class="big" id="teamA">-</div>

<div class="vs">VS</div>

<div class="big" id="teamB">-</div>

<div class="score">
<input id="scoreA" type="number" placeholder="0">
<input id="scoreB" type="number" placeholder="0">
</div>

<button class="save" onclick="saveScore()">บันทึกคะแนน</button>

<button class="shuffle" onclick="shuffleMatch()">🎲 สุ่มใหม่</button>

<button class="view" onclick="viewLast()">ดูรอบก่อนหน้า</button>

</div>

<div class="card">
<h3>🎮 จำนวนรอบที่เล่น</h3>
<div id="roundTable"></div>
</div>

<div class="card">
<h3>📜 ประวัติการแข่งขัน</h3>
<div id="history"></div>
</div>

<script>

let players=[]
let played={}
let round=0
let currentMatch=[]
let history=[]
let scoreSaved=false

function startGame(){

players=document.getElementById("players").value.trim().split("\n")

if(players.length!=8){
alert("ต้องมี 8 คน")
return
}

played={}
players.forEach(p=>played[p]=0)

round=1
history=[]
scoreSaved=false

createMatch()

}

function nextRound(){

if(!scoreSaved && history.length>0){
alert("ต้องบันทึกคะแนนก่อน")
return
}

round++
createMatch()

}

function createMatch(){

let sorted=[...players].sort((a,b)=>played[a]-played[b])

let selected=sorted.slice(0,4)

currentMatch=selected

selected.forEach(p=>played[p]++)

history.unshift({
round:round,
teamA:[selected[0],selected[1]],
teamB:[selected[2],selected[3]]
})

scoreSaved=false

updateUI()
updateRounds()
updateHistory()

}

function shuffleMatch(){

if(scoreSaved){
alert("บันทึกคะแนนแล้วสุ่มไม่ได้")
return
}

let shuffled=[...currentMatch].sort(()=>Math.random()-0.5)

currentMatch=shuffled

history[0].teamA=[shuffled[0],shuffled[1]]
history[0].teamB=[shuffled[2],shuffled[3]]

updateUI()
updateHistory()

}

function saveScore(){

let sA=parseInt(scoreA.value)
let sB=parseInt(scoreB.value)

if(isNaN(sA)||isNaN(sB)){
alert("ใส่คะแนนก่อน")
return
}

history[0].scoreA=sA
history[0].scoreB=sB

scoreA.value=""
scoreB.value=""

scoreSaved=true

updateHistory()

round++
createMatch()

}

function viewLast(){

if(history.length<2){
alert("ยังไม่มีรอบก่อนหน้า")
return
}

let h=history[1]

alert(
"รอบ "+h.round+"\n\n"+
h.teamA[0]+" / "+h.teamA[1]+
"\nVS\n"+
h.teamB[0]+" / "+h.teamB[1]
)

}

function updateUI(){

document.getElementById("round").innerText="รอบที่ "+round

if(currentMatch.length==4){

teamA.innerHTML=currentMatch[0]+" / "+currentMatch[1]
teamB.innerHTML=currentMatch[2]+" / "+currentMatch[3]

}

}

function updateRounds(){

let html=""

players.forEach(p=>{
html+=p+" เล่น "+played[p]+" รอบ<br>"
})

document.getElementById("roundTable").innerHTML=html

}

function updateHistory(){

let html=""

history.forEach(h=>{

html+=`
<div class="history">
รอบ ${h.round}<br>
${h.teamA[0]} / ${h.teamA[1]} ${h.scoreA ?? ""} 
VS 
${h.scoreB ?? ""} ${h.teamB[0]} / ${h.teamB[1]}
</div>
`

})

document.getElementById("history").innerHTML=html

}

function resetAll(){
location.reload()
}

</script>

</body>
</html>
