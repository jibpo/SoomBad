<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="/SoomBad/manifest.json">

<meta name="theme-color" content="#00d4ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Badminton">

<link rel="apple-touch-icon" href="/SoomBad/icon.png">
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
<title>🏸 โจ๋เรนเจอร์ Badminton</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Fredoka', sans-serif;
background:#00d4ff; /* ฟ้าสด */
padding:16px;
padding-bottom:90px;
}

/* HEADER */
.header{
background:#ffef00;
color:#000;

border:3px solid #000;
border-radius:16px;
padding:20px;

box-shadow:6px 6px 0px #000;
}

.title{
font-size:20px;
font-weight:800;
}

.subtitle{
font-size:13px;
color:#666;
margin-top:4px;
}

/* CARD */
.card{
background:#fff;
border:3px solid #000;
border-radius:16px;
padding:16px;
margin-bottom:16px;

box-shadow:6px 6px 0px #000; /* เงาแข็ง */
}

/* TEXTAREA */
textarea{
width:100%;
height:100px;

padding:12px;
border-radius:16px;

border:3px solid #000;
background:#f3f4f6;

font-size:14px;

box-sizing:border-box;
}

textarea:focus{
outline:none;
background:#fff;
}

/* BUTTON */
.btn{
width:100%;
padding:14px;
margin-top:10px;

border:3px solid #000;
border-radius:14px;

font-weight:800;
cursor:pointer;

box-shadow:4px 4px 0 #000;
transition:0.1s;
}

.btn:active{
transform:translate(4px,4px);
box-shadow:0 0 0 #000;
}

/* สีปุ่ม */
.primary{ background:#ff4d4d; }
.neon{ background:#00ff88; }
.danger{ background:#ff6b00; }

.primary{ background:#111; color:white; }
.neon{ background:#d4ff00; }
.danger{ background:#ef4444; color:white; }

/* MATCH */
.match-card{
background:#fff;
border:3px solid #000;
border-radius:16px;

box-shadow:6px 6px 0 #000;
text-align:center;
}

.round{
font-weight:600;
color:#666;
}

.teams{
margin:12px 0;
}

.team{
font-size:20px;
font-weight:800;
}

.vs{
margin:8px 0;
color:#999;
}

.team{
line-height:1.6;
}

/* START BTN */
.start{
background:#d4ff00;
border:none;
padding:14px;
border-radius:20px;
font-weight:800;
width:100%;
}

/* RANK */
.rank{
background:#fff;
border:3px solid #000;
border-radius:14px;
padding:12px;
margin-top:10px;

display:flex;
justify-content:space-between;

box-shadow:4px 4px 0 #000;
}

.rank.top1{ background:#00ff88; }
.rank.top2{ background:#fff200; }
.rank.top3{ background:#ffb347; }

/* HISTORY */
.history-card{
background:white;
border-radius:16px;
padding:14px;
margin-top:10px;
box-shadow:0 6px 14px rgba(0,0,0,0.05);
}

/* ANIMATION */
@keyframes fadeUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.win{
color:#16a34a;
font-weight:700;
}

.lose{
color:#9ca3af;
}

.tabbar span{
font-size:20px;
padding:10px;
border-radius:10px;
}

.tabbar span.active{
background:#00ff88;
border:2px solid #000;
}

/* TAB SYSTEM */
.tab{
display:none;
}

.tab.active{
display:block;
}

/* TABBAR */
.tabbar{
position:fixed;

/* 👇 ใช้ safe-area จริง */
bottom: calc(10px + env(safe-area-inset-bottom));

left:50%;
transform:translateX(-50%);

width:90%;
max-width:420px;

background:#fff;
border:3px solid #000;
border-radius:20px;

display:flex;
justify-content:space-around;
align-items:center;

padding:10px;

box-shadow:6px 6px 0 #000;
z-index:999;
}

.tabbar span{
width:44px;
height:44px;

display:flex;
align-items:center;
justify-content:center;

font-size:20px;
border-radius:12px;
}

.tabbar span.active{
background:#d4ff00;
color:#000;

transform:translateY(-4px) scale(1.1);
box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

.tabbar span:active{
transform:scale(0.9);
}

.tabbar span.active{
background:#d4ff00;
border:2px solid #000;
}

.tabbar span{
transition:0.2s;
}

.tabbar span.active{
transform:translateY(-6px) scale(1.1);
}

.tab{
display:none;
opacity:0;
transform:translateY(10px);
transition:0.25s;
}

.tab.active{
display:block;
opacity:1;
transform:translateY(0);
}

.history-row{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.teams-text{
font-weight:600;
}

.history-score{
font-weight:800;
}

.history-card{
display:flex;
flex-direction:column;
gap:6px;
}

.win{
color:#16a34a;
font-weight:800;
}

body{
padding-bottom: calc(110px + env(safe-area-inset-bottom));
}

.start{
margin-bottom:30px;
}

.tabbar span{
position:relative;
z-index:1;
}

.indicator{
position:absolute;
bottom:6px;
width:30px;
height:4px;
background:#000;
border-radius:10px;
transition:0.3s;
left:12%;
pointer-events:none;
z-index:0;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="title">🏸 โจ๋เรนเจอร์ Badminton</div>
  <div class="subtitle">จัดคู่ & แข่งแบบอัตโนมัติ</div>
</div>

<!-- HOME TAB -->
<div id="homeTab" class="tab active">

  <div class="card">
    <textarea id="players" placeholder="ใส่ชื่อ"></textarea>

    <button class="btn primary" onclick="startGame()">เริ่มใหม่</button>
    <button class="btn neon" onclick="nextRound()">สุ่มรอบ</button>
    <button class="btn danger" onclick="resetAll()">รีเซ็ต</button>
  </div>

  <div class="card match-card">
    <div id="round" class="round">รอบที่ 0</div>

    <div class="teams">
      <div class="team" id="teamA">-</div>
      <div class="vs">VS</div>
      <div class="team" id="teamB">-</div>
    </div>

    <button class="start" onclick="openScoreboard()">เริ่มแข่ง</button>
  </div>

</div>

<!-- RANK TAB -->
<div id="rankTab" class="tab">
  <div class="card">
    <h3>🏆 ตารางคะแนน</h3>
    <div id="ranking"></div>
  </div>
</div>

<!-- HISTORY TAB -->
<div id="historyTab" class="tab">
  <div class="card">
    <h3>📜 ประวัติการแข่งขัน</h3>
    <div id="history"></div>
  </div>
</div>

<script>

const roundEl = document.getElementById("round")
const teamAEl = document.getElementById("teamA")
const teamBEl = document.getElementById("teamB")
const rankingEl = document.getElementById("ranking")
const historyEl = document.getElementById("history")

let players=[]
let played={},wins={},pf={},pa={},consecutive={}
let usedPairs=new Set()
let currentMatch=[]
let round=0
let history=[]

function save(){
localStorage.setItem("bad_full",JSON.stringify({
players,played,wins,pf,pa,consecutive,
usedPairs:[...usedPairs],currentMatch,round,history
}))
}

function load(){
let d=JSON.parse(localStorage.getItem("bad_full")||"null")
if(!d)return
players=d.players
played=d.played
wins=d.wins
pf=d.pf
pa=d.pa
consecutive=d.consecutive
usedPairs=new Set(d.usedPairs)
currentMatch=d.currentMatch
round=d.round
history=d.history||[]
updateUI()
updateRank()
updateHistory()
}
load()

function startGame(){
players=document.getElementById("players").value.trim().split("\n").filter(x=>x)

if(players.length<4){alert("ต้องมีอย่างน้อย 4 คน");return}

played={},wins={},pf={},pa={},consecutive={}
usedPairs=new Set()
history=[]
round=0

players.forEach(p=>{
played[p]=0
wins[p]=0
pf[p]=0
pa[p]=0
consecutive[p]=0
})

nextRound()
}

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function valid(a,b,c,d){
return !usedPairs.has([a,b].sort().join("-")) &&
       !usedPairs.has([c,d].sort().join("-"))
}

function pickPlayers(){

let eligible = players.filter(p=>consecutive[p]<2)
if(eligible.length<4) eligible=[...players]

eligible.sort((a,b)=>played[a]-played[b])

let pool = eligible.slice(0,Math.min(6,eligible.length))
if(pool.length<4) pool=[...players]

for(let i=0;i<50;i++){
let s = shuffle([...pool]).slice(0,4)
if(s.length===4 && valid(s[0],s[1],s[2],s[3])) return s
}

return shuffle([...players]).slice(0,4)
}

function nextRound(){
round++
let s = pickPlayers()
currentMatch=s

if(s.length<4)return

usedPairs.add([s[0],s[1]].sort().join("-"))
usedPairs.add([s[2],s[3]].sort().join("-"))

players.forEach(p=>{
if(s.includes(p)){
played[p]++
consecutive[p]++
}else{
consecutive[p]=0
}
})

updateUI()
updateRank()
save()
document.querySelector('.match-card').scrollIntoView({
  behavior:'smooth'
})
}

function openScoreboard(){
window.open("scoreboard.html","_blank")
}

function resetAll(){
localStorage.removeItem("bad_full")
location.reload()
}

function updateUI(){
if(currentMatch.length<4){
teamAEl.innerHTML="-"
teamBEl.innerHTML="-"
return
}
roundEl.innerText="รอบที่ "+round
teamAEl.innerHTML=currentMatch[0]+"<br>"+currentMatch[1]
teamBEl.innerHTML=currentMatch[2]+"<br>"+currentMatch[3]
}

function updateRank(){

let sorted=[...players].sort((a,b)=>{
if(wins[b]!=wins[a]) return wins[b]-wins[a]
return (pf[b]-pa[b])-(pf[a]-pa[a])
})

rankingEl.innerHTML=sorted.map((p,i)=>{

let cls="rank"
if(i===0) cls+=" top1"
if(i===1) cls+=" top2"
if(i===2) cls+=" top3"

return `
<div class="${cls}">
<div>#${i+1} ${p}</div>
<div>🏆 ${wins[p]}</div>
</div>
`
}).join("")
}

function updateHistory(){

historyEl.innerHTML = history.map(h=>{

return `
<div class="history-card">

  <div class="history-row">

    <div class="teams-text">
      ${h.teamA[0]} & ${h.teamA[1]} 
      <span class="vs">vs</span> 
      ${h.teamB[0]} & ${h.teamB[1]}
    </div>

    <div class="history-score">
      <span class="${h.scoreA > h.scoreB ? 'win' : ''}">
        ${h.scoreA}
      </span>
      -
      <span class="${h.scoreB > h.scoreA ? 'win' : ''}">
        ${h.scoreB}
      </span>
    </div>

  </div>

</div>
`

}).reverse().join("")
}

function switchTab(tabId, el){

// ซ่อนทุก tab
document.querySelectorAll('.tab').forEach(t=>{
  t.classList.remove('active')
})

// แสดง tab ที่กด
document.getElementById(tabId).classList.add('active')

// reset icon
document.querySelectorAll('.tabbar span').forEach(i=>{
  i.classList.remove('active')
})

// highlight icon ที่กด
el.classList.add('active')
const indicator = document.querySelector('.indicator')
const tabs = document.querySelectorAll('.tabbar span')
const index = Array.from(tabs).indexOf(el)

if(indicator){
  indicator.style.left = (index * 33.3 + 12) + "%"
}
       
</script>

<div class="tabbar">
  <div class="indicator"></div>
  <span onclick="switchTab('homeTab',this)" class="active">🏠</span>
  <span onclick="switchTab('rankTab',this)">🏆</span>
  <span onclick="switchTab('historyTab',this)">📜</span>
</div>

</body>
</html>
