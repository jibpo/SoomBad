<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>โจ๋เรนเจอร์ On Court</title>

<style>

body{
margin:0;
font-family:Georgia,serif;
background:#1f3a2e;
color:#f4f1e8;
padding:20px;
background-image:linear-gradient(#1f3a2e,#14281f);
}

h1{
text-align:center;
font-size:30px;
margin-bottom:20px;
}

.card{
background:rgba(44,59,48,.9);
padding:18px;
border-radius:18px;
margin-bottom:18px;
box-shadow:0 8px 25px rgba(0,0,0,.4);
}

textarea{
width:100%;
height:110px;
font-size:18px;
padding:12px;
border-radius:12px;
border:none;
background:#f4f1e8;
color:#222;
}

button{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:14px;
margin-top:10px;
font-weight:bold;
}

.start{background:#e5d6b8;}
.next{background:#7d9a7a;color:white;}
.reset{background:#9a3d3d;color:white;}

.save{background:#b8833b;color:white;}
.view{background:#666;color:white;}

.big{
font-size:36px;
text-align:center;
margin:18px 0;
font-weight:bold;
}

.vs{
text-align:center;
opacity:.7;
font-size:20px;
}

.score-box{
display:flex;
gap:14px;
margin-top:12px;
}

.score-box input{

width:50%;
height:80px;

font-size:40px;
font-weight:bold;

border-radius:14px;
border:none;

text-align:center;

background:#f4f1e8;
color:#222;

}

.round-card{
background:#364b3c;
padding:14px;
border-radius:14px;
margin-bottom:10px;
}

.history-card{
background:#425d4b;
padding:12px;
border-radius:12px;
margin-bottom:10px;
font-size:15px;
}

.section-title{
font-size:20px;
margin-bottom:12px;
}

</style>
</head>

<body>

<h1>🏸 โจ๋เรนเจอร์ On Court</h1>

<div class="card">

<textarea id="players" placeholder="ใส่ชื่อ 8 คน (บรรทัดละ 1 คน)"></textarea>

<button class="start" onclick="startGame()">เริ่มเกม</button>
<button class="next" onclick="nextRound()">รอบถัดไป</button>
<button class="reset" onclick="resetAll()">รีเซ็ต</button>

</div>


<div class="card">

<div class="section-title">🏸 แมตช์ปัจจุบัน</div>

<div id="round">รอบที่ 0</div>

<div class="big" id="teamA">-</div>

<div class="vs">VS</div>

<div class="big" id="teamB">-</div>

<div class="score-box">

<input type="number" id="scoreA" placeholder="0">
<input type="number" id="scoreB" placeholder="0">

</div>

<button class="save" onclick="saveScore()">บันทึกคะแนน</button>

<button class="view" onclick="viewLast()">ดูรอบก่อนหน้า</button>

</div>


<div class="card">

<div class="section-title">🎮 จำนวนรอบที่เล่น</div>

<div id="roundTable"></div>

</div>


<div class="card">

<div class="section-title">📜 ประวัติการแข่งขัน</div>

<div id="history"></div>

</div>


<script>

let players=[]
let played={}
let round=0
let currentMatch=[]
let history=[]

function save(){

localStorage.setItem("badmintonSmart",JSON.stringify({
players,played,round,currentMatch,history
}))

}

function load(){

let data=localStorage.getItem("badmintonSmart")

if(data){

let d=JSON.parse(data)

players=d.players
played=d.played
round=d.round
currentMatch=d.currentMatch
history=d.history || []

updateUI()
updateRounds()
updateHistory()

}

}

load()

function startGame(){

players=document.getElementById("players").value.trim().split("\n")

if(players.length!==8){
alert("ต้องมี 8 คน")
return
}

played={}

players.forEach(p=>{
played[p]=0
})

round=1
history=[]

createMatch()

save()

}

function nextRound(){

round++

createMatch()

save()

}

function createMatch(){

let sorted=[...players].sort((a,b)=>played[a]-played[b])

let selected=sorted.slice(0,4)

currentMatch=selected

selected.forEach(p=>{
played[p]++
})

history.unshift({
round:round,
teamA:[selected[0],selected[1]],
teamB:[selected[2],selected[3]]
})

updateUI()
updateRounds()
updateHistory()

}

function saveScore(){

let sA=parseInt(scoreA.value)
let sB=parseInt(scoreB.value)

if(isNaN(sA)||isNaN(sB)){
alert("ใส่คะแนนก่อน")
return
}

history[0].scoreA=sA
history[0].scoreB=sB

scoreA.value=""
scoreB.value=""

updateHistory()

save()

}

function viewLast(){

if(history.length<2){
alert("ยังไม่มีรอบก่อนหน้า")
return
}

let last=history[1]

alert(
"รอบ "+last.round+"\n\n"+
last.teamA[0]+" / "+last.teamA[1]+
"\nVS\n"+
last.teamB[0]+" / "+last.teamB[1]
)

}

function updateUI(){

round.innerText="รอบที่ "+round

if(currentMatch.length===4){

teamA.innerHTML=currentMatch[0]+" / "+currentMatch[1]
teamB.innerHTML=currentMatch[2]+" / "+currentMatch[3]

}

}

function updateRounds(){

let html=""

players.forEach(p=>{

html+=`

<div class="round-card">

<b>${p}</b><br>

🎮 เล่นไปแล้ว <b>${played[p]}</b> รอบ

</div>

`

})

document.getElementById("roundTable").innerHTML=html

}

function updateHistory(){

let html=""

history.forEach(h=>{

html+=`

<div class="history-card">

<b>รอบ ${h.round}</b><br>

${h.teamA[0]} / ${h.teamA[1]}
${h.scoreA ?? ""}

VS

${h.scoreB ?? ""}

${h.teamB[0]} / ${h.teamB[1]}

</div>

`

})

document.getElementById("history").innerHTML=html

}

function resetAll(){

localStorage.removeItem("badmintonSmart")
location.reload()

}

</script>

</body>
</html>
