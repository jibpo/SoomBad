<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard</title>

<style>
body{
margin:0;
font-family:-apple-system;
height:100vh;
display:flex;
flex-direction:column;
}

/* ทีม A */
.teamA{
flex:1;
background:#ef4444;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* ทีม B */
.teamB{
flex:1;
background:#3b82f6;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.name{
font-size:36px;
margin-bottom:10px;
}

.score{
font-size:120px;
font-weight:bold;
}

/* ปุ่มจบเกม */
.finish{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:12px 20px;
border-radius:10px;
z-index:10;
}
</style>

</head>

<body>

<div class="teamA" id="areaA">
<div class="name" id="nameA"></div>
<div class="score" id="scoreA">0</div>
</div>

<div class="teamB" id="areaB">
<div class="name" id="nameB"></div>
<div class="score" id="scoreB">0</div>
</div>

<div class="finish" onclick="finishMatch()">จบเกม</div>

<script>

let scoreA = 0
let scoreB = 0
let match = []

function loadMatch(){

let d = JSON.parse(localStorage.getItem("bad_full") || "null")
if(!d) return

match = d.currentMatch || []

if(match.length === 4){
document.getElementById("nameA").innerText = match[0] + " " + match[1]
document.getElementById("nameB").innerText = match[2] + " " + match[3]
}
}

// ⭐ ใช้ event แยก ไม่ใช้ click รวม
document.getElementById("areaA").addEventListener("click",(e)=>{
handleTap("A", e)
})

document.getElementById("areaB").addEventListener("click",(e)=>{
handleTap("B", e)
})

function handleTap(team, e){

let w = window.innerWidth
let x = e.clientX

if(team === "A"){
    if(x > w/2){
        scoreA++
    }else{
        scoreA = Math.max(0, scoreA - 1)
    }
}else{
    if(x > w/2){
        scoreB++
    }else{
        scoreB = Math.max(0, scoreB - 1)
    }
}

updateUI()
}

function updateUI(){
document.getElementById("scoreA").innerText = scoreA
document.getElementById("scoreB").innerText = scoreB
}

function finishMatch(){

let d = JSON.parse(localStorage.getItem("bad_full") || "null")
if(!d) return

if(!d.history) d.history = []
if(!d.pf) d.pf = {}
if(!d.pa) d.pa = {}
if(!d.wins) d.wins = {}

let [a,b,c,d2] = match

d.pf[a]+=scoreA
d.pf[b]+=scoreA
d.pa[a]+=scoreB
d.pa[b]+=scoreB

d.pf[c]+=scoreB
d.pf[d2]+=scoreB
d.pa[c]+=scoreA
d.pa[d2]+=scoreA

if(scoreA > scoreB){
d.wins[a]++
d.wins[b]++
}else{
d.wins[c]++
d.wins[d2]++
}

d.history.push({
round:d.round,
teamA:[a,b],
teamB:[c,d2],
scoreA:scoreA,
scoreB:scoreB
})

localStorage.setItem("bad_full", JSON.stringify(d))

alert("บันทึกเรียบร้อย")
window.close()
}

loadMatch()

</script>

</body>
</html>
