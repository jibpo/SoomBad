<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badminton Pro Scheduler</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont;
    background:linear-gradient(135deg,#1f2937,#111827);
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    font-size:32px;
    margin-bottom:20px;
}

.card{
    background:#1f2937;
    padding:25px;
    border-radius:25px;
    margin-bottom:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

textarea{
    width:100%;
    height:160px;
    font-size:22px;
    padding:15px;
    border-radius:18px;
    border:none;
    outline:none;
}

button{
    width:100%;
    padding:18px;
    font-size:22px;
    border:none;
    border-radius:20px;
    margin-top:15px;
    font-weight:bold;
}

.start{ background:#2563eb; color:white; }
.next{ background:#22c55e; color:white; }
.reset{ background:#ef4444; color:white; }

.round{
    text-align:center;
    font-size:26px;
    margin-bottom:20px;
    opacity:0.8;
}

.team{
    text-align:center;
    margin-top:25px;
}

.team-title{
    font-size:24px;
    opacity:0.7;
}

.names{
    font-size:40px;
    font-weight:800;
    margin-top:10px;
}

.vs{
    text-align:center;
    font-size:28px;
    margin:25px 0;
    opacity:0.6;
}

.footer{
    text-align:center;
    font-size:14px;
    opacity:0.5;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>🏸 BAD SCHEDULER PRO</h1>

<div class="card">
<textarea id="players" placeholder="ใส่ชื่อ 8 คน (บรรทัดละ 1 คน)"></textarea>
<button class="start" onclick="startGame()">เริ่มเกมใหม่</button>
<button class="next" onclick="nextRound()">สุ่มรอบถัดไป</button>
<button class="reset" onclick="resetAll()">ล้างทั้งหมด</button>
</div>

<div class="card">
<div class="round" id="round">รอบที่ 0</div>

<div class="team">
<div class="team-title">TEAM A</div>
<div class="names" id="teamA">-</div>
</div>

<div class="vs">VS</div>

<div class="team">
<div class="team-title">TEAM B</div>
<div class="names" id="teamB">-</div>
</div>

<div class="footer">
ครบทุกคนก่อน 1 รอบ | ไม่ซ้ำคู่ | ไม่เกิน 2 รอบติด
</div>
</div>

<script>

let players=[]
let consecutive={}
let usedPairs=new Set()
let waiting=[]
let round=0

function save(){
localStorage.setItem("badPro",JSON.stringify({
players,consecutive,usedPairs:[...usedPairs],waiting,round
}))
}

function load(){
let data=localStorage.getItem("badPro")
if(data){
let d=JSON.parse(data)
players=d.players
consecutive=d.consecutive
usedPairs=new Set(d.usedPairs)
waiting=d.waiting
round=d.round
updateRound()
}
}
load()

function startGame(){
players=document.getElementById("players").value.trim().split("\n")
if(players.length!==8){alert("ต้องมี 8 คน");return}

consecutive={}
usedPairs=new Set()
waiting=[...players]
round=0

players.forEach(p=>consecutive[p]=0)

save()
nextRound()
}

function shuffle(a){
return a.sort(()=>Math.random()-0.5)
}

function valid(a,b,c,d){
let p1=[a,b].sort().join("-")
let p2=[c,d].sort().join("-")
return !usedPairs.has(p1)&&!usedPairs.has(p2)
}

function nextRound(){
if(players.length!==8){alert("กดเริ่มเกมก่อน");return}

round++

let selected=[]

if(waiting.length>=4){
shuffle(waiting)
selected=waiting.splice(0,4)
}else{
let eligible=players.filter(p=>consecutive[p]<2)
shuffle(eligible)
selected=eligible.slice(0,4)
}

let tries=0
while(tries<50){
shuffle(selected)
if(valid(selected[0],selected[1],selected[2],selected[3])) break
tries++
}

let a=selected[0]
let b=selected[1]
let c=selected[2]
let d=selected[3]

usedPairs.add([a,b].sort().join("-"))
usedPairs.add([c,d].sort().join("-"))

players.forEach(p=>{
if(selected.includes(p)){ consecutive[p]++ }
else{ consecutive[p]=0 }
})

document.getElementById("teamA").innerHTML=`${a}<br>${b}`
document.getElementById("teamB").innerHTML=`${c}<br>${d}`

updateRound()
save()
}

function updateRound(){
document.getElementById("round").innerText="รอบที่ "+round
}

function resetAll(){
localStorage.removeItem("badPro")
location.reload()
}

</script>
</body>
</html>
