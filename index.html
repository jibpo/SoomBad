<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badminton Infinite</title>

<style>
body{margin:0;font-family:-apple-system;background:#0f172a;color:white;padding:16px;}
.card{background:#1e293b;padding:16px;border-radius:16px;margin-bottom:12px;}
textarea{width:100%;height:140px;font-size:18px;border-radius:12px;padding:10px;border:none;}
button{width:100%;padding:14px;margin-top:10px;font-size:18px;border:none;border-radius:12px;font-weight:bold;}
.start{background:#3b82f6;}
.next{background:#22c55e;}
.save{background:#f59e0b;}
.reset{background:#ef4444;}
.big{font-size:30px;text-align:center;margin:10px 0;}
.vs{text-align:center;margin:10px 0;}
.score{display:flex;gap:10px;}
.score input{flex:1;font-size:20px;padding:10px;border-radius:10px;border:none;text-align:center;}
.rank{display:flex;justify-content:space-between;padding:8px;margin-top:6px;background:#334155;border-radius:10px;}
</style>
</head>

<body>

<div class="card">
<textarea id="players" placeholder="ใส่ชื่อ (กี่คนก็ได้)"></textarea>
<button class="start" onclick="startGame()">เริ่มใหม่</button>
<button class="next" onclick="nextRound()">สุ่มรอบถัดไป</button>
<button class="reset" onclick="resetAll()">ล้าง</button>
</div>

<div class="card">
<div id="round">รอบที่ 0</div>

<div class="big" id="teamA">-</div>
<div class="vs">VS</div>
<div class="big" id="teamB">-</div>

<div class="score">
<input id="scoreA" placeholder="A" type="number">
<input id="scoreB" placeholder="B" type="number">
</div>

<button class="save" onclick="saveScore()">บันทึกคะแนน</button>
</div>

<div class="card">
<div id="ranking"></div>
</div>

<script>

// ✅ FIX undefined (สำคัญมาก)
const roundEl = document.getElementById("round")
const teamAEl = document.getElementById("teamA")
const teamBEl = document.getElementById("teamB")
const rankingEl = document.getElementById("ranking")
const scoreAEl = document.getElementById("scoreA")
const scoreBEl = document.getElementById("scoreB")

let players=[]
let played={},wins={},pf={},pa={},consecutive={}
let usedPairs=new Set()
let currentMatch=[]
let round=0

function save(){
localStorage.setItem("bad_infinite",JSON.stringify({
players,played,wins,pf,pa,consecutive,usedPairs:[...usedPairs],currentMatch,round
}))
}

function load(){
let d=JSON.parse(localStorage.getItem("bad_infinite")||"null")
if(!d)return
players=d.players
played=d.played
wins=d.wins
pf=d.pf
pa=d.pa
consecutive=d.consecutive
usedPairs=new Set(d.usedPairs)
currentMatch=d.currentMatch
round=d.round
updateUI()
updateRank()
}
load()

function startGame(){
players=document.getElementById("players").value.trim().split("\n").filter(x=>x)

if(players.length<4){alert("ต้องมีอย่างน้อย 4 คน");return}

played={},wins={},pf={},pa={},consecutive={}
usedPairs=new Set()
round=0

players.forEach(p=>{
played[p]=0
wins[p]=0
pf[p]=0
pa[p]=0
consecutive[p]=0
})

nextRound()
}

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function valid(a,b,c,d){
return !usedPairs.has([a,b].sort().join("-")) &&
       !usedPairs.has([c,d].sort().join("-"))
}

// ⭐ infinite + fair
function pickPlayers(){

let eligible = players.filter(p=>consecutive[p]<2)

eligible.sort((a,b)=>played[a]-played[b])

let pool = eligible.slice(0,Math.min(6,eligible.length))

// พยายามไม่ซ้ำ
for(let i=0;i<50;i++){
let s = shuffle([...pool]).slice(0,4)
if(valid(s[0],s[1],s[2],s[3])) return s
}

// fallback: ยอมซ้ำ
return shuffle([...pool]).slice(0,4)
}

function nextRound(){

round++

let s = pickPlayers()
currentMatch = s

usedPairs.add([s[0],s[1]].sort().join("-"))
usedPairs.add([s[2],s[3]].sort().join("-"))

players.forEach(p=>{
if(s.includes(p)){
played[p]++
consecutive[p]++
}else{
consecutive[p]=0
}
})

updateUI()
updateRank()
save()
}

function saveScore(){

let A=parseInt(scoreAEl.value)
let B=parseInt(scoreBEl.value)

if(isNaN(A)||isNaN(B)){alert("ใส่คะแนน");return}

let [a,b,c,d]=currentMatch

pf[a]+=A; pf[b]+=A
pa[a]+=B; pa[b]+=B

pf[c]+=B; pf[d]+=B
pa[c]+=A; pa[d]+=A

if(A>B){wins[a]++;wins[b]++}
else if(B>A){wins[c]++;wins[d]++}

scoreAEl.value=""
scoreBEl.value=""

updateRank()
save()
}

function updateUI(){
roundEl.innerText="รอบที่ "+round
teamAEl.innerHTML=currentMatch[0]+"<br>"+currentMatch[1]
teamBEl.innerHTML=currentMatch[2]+"<br>"+currentMatch[3]
}

function updateRank(){
let sorted=[...players].sort((a,b)=>{
if(wins[b]!=wins[a]) return wins[b]-wins[a]
return (pf[b]-pa[b])-(pf[a]-pa[a])
})

rankingEl.innerHTML=sorted.map((p,i)=>`
<div class="rank">
<span>#${i+1} ${p}</span>
<span>🏆${wins[p]} | 🎮${played[p]}</span>
</div>
`).join("")
}

function resetAll(){
localStorage.removeItem("bad_infinite")
location.reload()
}

</script>

</body>
</html>
