<script>

let players=[]
let played={}
let wins={}
let pointsFor={}
let pointsAgainst={}
let consecutive={}
let usedPairs=new Set()
let waiting=[]
let round=0
let currentMatch=[]

function save(){
localStorage.setItem("badmintonPro",JSON.stringify({
players,played,wins,pointsFor,pointsAgainst,
consecutive,usedPairs:[...usedPairs],waiting,round,currentMatch
}))
}

function load(){
let data=localStorage.getItem("badmintonPro")
if(data){
let d=JSON.parse(data)
players=d.players
played=d.played
wins=d.wins
pointsFor=d.pointsFor
pointsAgainst=d.pointsAgainst
consecutive=d.consecutive
usedPairs=new Set(d.usedPairs)
waiting=d.waiting
round=d.round
currentMatch=d.currentMatch
updateUI()
updateRanking()
}
}
load()

function startGame(){
players=document.getElementById("players").value.trim().split("\n")
if(players.length!==8){alert("ต้องมี 8 คน");return}

played={}
wins={}
pointsFor={}
pointsAgainst={}
consecutive={}
usedPairs=new Set()
waiting=[...players]
round=0

players.forEach(p=>{
played[p]=0
wins[p]=0
pointsFor[p]=0
pointsAgainst[p]=0
consecutive[p]=0
})

save()
nextRound()
}

function shuffle(a){
return a.sort(()=>Math.random()-0.5)
}

function valid(a,b,c,d){
let p1=[a,b].sort().join("-")
let p2=[c,d].sort().join("-")
return !usedPairs.has(p1)&&!usedPairs.has(p2)
}

function nextRound(){
round++

let selected=[]
if(waiting.length>=4){
shuffle(waiting)
selected=waiting.splice(0,4)
}else{
let eligible=players.filter(p=>consecutive[p]<2)
shuffle(eligible)
selected=eligible.slice(0,4)
}

let tries=0
while(tries<50){
shuffle(selected)
if(valid(selected[0],selected[1],selected[2],selected[3])) break
tries++
}

currentMatch=selected

usedPairs.add([selected[0],selected[1]].sort().join("-"))
usedPairs.add([selected[2],selected[3]].sort().join("-"))

players.forEach(p=>{
if(selected.includes(p)){
played[p]++
consecutive[p]++
}else{
consecutive[p]=0
}
})

updateUI()
updateRanking()
save()
}

function saveScore(){
let sA=parseInt(scoreA.value)
let sB=parseInt(scoreB.value)

if(isNaN(sA)||isNaN(sB)){
alert("ใส่คะแนนก่อน")
return
}

let [a,b,c,d]=currentMatch

// เก็บแต้ม
pointsFor[a]+=sA
pointsFor[b]+=sA
pointsAgainst[a]+=sB
pointsAgainst[b]+=sB

pointsFor[c]+=sB
pointsFor[d]+=sB
pointsAgainst[c]+=sA
pointsAgainst[d]+=sA

// เก็บชนะ
if(sA>sB){
wins[a]++
wins[b]++
}else if(sB>sA){
wins[c]++
wins[d]++
}

scoreA.value=""
scoreB.value=""

updateRanking()
save()
}

function updateRanking(){

let sorted=[...players].sort((a,b)=>{
if(wins[b]!==wins[a]) return wins[b]-wins[a]
let diffB=pointsFor[b]-pointsAgainst[b]
let diffA=pointsFor[a]-pointsAgainst[a]
return diffB-diffA
})

let html=""

sorted.forEach((p,i)=>{
let diff=pointsFor[p]-pointsAgainst[p]

html+=`
<div class="rank-row">
<div>
<b>#${i+1} ${p}</b><br>
<small>เล่น ${played[p]} รอบ</small>
</div>

<div style="text-align:right">
🏆 ${wins[p]} ชนะ<br>
🎯 ${pointsFor[p]} ได้ | ❌ ${pointsAgainst[p]} เสีย | ➕ ${diff}
</div>
</div>
`
})

ranking.innerHTML=html
}

let html=""

sorted.forEach((p,i)=>{
let diff=pointsFor[p]-pointsAgainst[p]
html+=`
<div class="rank-row">
<span>#${i+1} ${p}</span>
<span>
🏆 ${wins[p]} |
🎯 ${pointsFor[p]} |
❌ ${pointsAgainst[p]} |
➕ ${diff}
</span>
</div>
`
})

ranking.innerHTML=html
}

function resetAll(){
localStorage.removeItem("badmintonPro")
location.reload()
}

</script>
