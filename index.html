<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badminton Match</title>

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont;
background:#dbeafe; /* ฟ้าอ่อน */
padding:16px;
}

/* card */
.card{
background:white;
border-radius:22px;
padding:16px;
margin-bottom:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* section title */
h3{
margin-bottom:10px;
}

/* textarea */
textarea{
width:100%;
height:110px;
border-radius:16px;
padding:12px;
border:none;
background:#f1f5f9;
font-size:14px;
}

/* button */
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:18px;
font-weight:600;
font-size:14px;
}

/* ปุ่ม */
button:nth-child(2){ background:#2563eb; color:white; }
button:nth-child(3){ background:#22c55e; color:white; }
button:nth-child(4){ background:#ef4444; color:white; }

/* match box */
.big{
font-size:26px;
text-align:center;
font-weight:700;
margin:10px 0;
}

.vs{
text-align:center;
color:#64748b;
margin:6px 0;
}

/* ปุ่มเริ่ม */
.card button:last-child{
background:#1e3a8a;
color:white;
}

/* ranking */
.rank{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
margin-top:10px;
border-radius:18px;
background:#eff6ff;
}

.rank-left{
font-weight:600;
}

.rank-right{
font-size:13px;
color:#475569;
}

/* top */
.rank.top1{
background:#fef9c3;
}
.rank.top2{
background:#e2e8f0;
}
.rank.top3{
background:#fed7aa;
}

/* history */
.history-card{
background:#f8fafc;
border-radius:18px;
padding:14px;
margin-top:10px;
}

.history-round{
font-size:12px;
color:#94a3b8;
margin-bottom:6px;
}

.history-team{
font-weight:600;
}

.history-score{
font-size:18px;
font-weight:bold;
text-align:right;
margin-top:8px;
}

.win{ color:#16a34a; }
.lose{ color:#94a3b8; }
</style>
</head>

<body>
<div class="card" style="background:#1e3a8a; color:white;">
<h2 style="margin:0;">🏸 Badminton Match</h2>
<div style="font-size:13px; opacity:0.8;">จัดคู่ + เก็บคะแนน</div>
</div>
<div class="card">
<textarea id="players" placeholder="ใส่ชื่อ (บรรทัดละ 1 คน)"></textarea>

<button onclick="startGame()">เริ่มใหม่</button>
<button onclick="nextRound()">สุ่มรอบถัดไป</button>
<button onclick="resetAll()">รีเซ็ตทั้งหมด</button>
</div>

<div class="card" style="background:#eff6ff;">
<div id="round">รอบที่ 0</div>

<div class="big" id="teamA">-</div>
<div class="vs">VS</div>
<div class="big" id="teamB">-</div>

<button onclick="openScoreboard()">เริ่มแข่ง</button>
</div>

<div class="card">
<h3>🏆 ตารางคะแนน</h3>
<div id="ranking"></div>
</div>

<div class="card">
<h3>📜 ประวัติการแข่งขัน</h3>
<div id="history"></div>
</div>

<script>

const roundEl = document.getElementById("round")
const teamAEl = document.getElementById("teamA")
const teamBEl = document.getElementById("teamB")
const rankingEl = document.getElementById("ranking")
const historyEl = document.getElementById("history")

let players=[]
let played={},wins={},pf={},pa={},consecutive={}
let usedPairs=new Set()
let currentMatch=[]
let round=0
let history=[]

function save(){
localStorage.setItem("bad_full",JSON.stringify({
players,played,wins,pf,pa,consecutive,
usedPairs:[...usedPairs],currentMatch,round,history
}))
}

function load(){
let d=JSON.parse(localStorage.getItem("bad_full")||"null")
if(!d)return
players=d.players
played=d.played
wins=d.wins
pf=d.pf
pa=d.pa
consecutive=d.consecutive
usedPairs=new Set(d.usedPairs)
currentMatch=d.currentMatch
round=d.round
history=d.history||[]
updateUI()
updateRank()
updateHistory()
}
load()

function startGame(){
players=document.getElementById("players").value.trim().split("\n").filter(x=>x)

if(players.length<4){alert("ต้องมีอย่างน้อย 4 คน");return}

played={},wins={},pf={},pa={},consecutive={}
usedPairs=new Set()
history=[]
round=0

players.forEach(p=>{
played[p]=0
wins[p]=0
pf[p]=0
pa[p]=0
consecutive[p]=0
})

nextRound()
}

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function valid(a,b,c,d){
return !usedPairs.has([a,b].sort().join("-")) &&
       !usedPairs.has([c,d].sort().join("-"))
}

function pickPlayers(){

let eligible = players.filter(p=>consecutive[p]<2)
if(eligible.length<4) eligible=[...players]

eligible.sort((a,b)=>played[a]-played[b])

let pool = eligible.slice(0,Math.min(6,eligible.length))
if(pool.length<4) pool=[...players]

for(let i=0;i<50;i++){
let s = shuffle([...pool]).slice(0,4)
if(s.length===4 && valid(s[0],s[1],s[2],s[3])) return s
}

return shuffle([...players]).slice(0,4)
}

function nextRound(){
round++
let s = pickPlayers()
currentMatch=s

if(s.length<4)return

usedPairs.add([s[0],s[1]].sort().join("-"))
usedPairs.add([s[2],s[3]].sort().join("-"))

players.forEach(p=>{
if(s.includes(p)){
played[p]++
consecutive[p]++
}else{
consecutive[p]=0
}
})

updateUI()
updateRank()
save()
}

function openScoreboard(){
window.open("scoreboard.html","_blank")
}

function resetAll(){
localStorage.removeItem("bad_full")
location.reload()
}

function updateUI(){
if(currentMatch.length<4){
teamAEl.innerHTML="-"
teamBEl.innerHTML="-"
return
}
roundEl.innerText="รอบที่ "+round
teamAEl.innerHTML=currentMatch[0]+"<br>"+currentMatch[1]
teamBEl.innerHTML=currentMatch[2]+"<br>"+currentMatch[3]
}

function updateRank(){

let sorted=[...players].sort((a,b)=>{
if(wins[b]!=wins[a]) return wins[b]-wins[a]
return (pf[b]-pa[b])-(pf[a]-pa[a])
})

rankingEl.innerHTML=sorted.map((p,i)=>{

let cls = "rank"
if(i===0) cls+=" top1"
if(i===1) cls+=" top2"
if(i===2) cls+=" top3"

return `
<div class="${cls}">
<div class="rank-left">#${i+1} ${p}</div>
<div class="rank-right">
🏆 ${wins[p]}<br>
🎮 ${played[p]}
</div>
</div>
`
}).join("")
}

function updateHistory(){

historyEl.innerHTML = history.map(h=>{

let winA = h.scoreA > h.scoreB
let winB = h.scoreB > h.scoreA

return `
<div class="history-card">

<div class="history-round">
รอบ ${h.round}
</div>

<div class="history-team ${winA?'win':'lose'}">
${h.teamA[0]} & ${h.teamA[1]}
</div>

<div style="text-align:center; margin:6px 0;">vs</div>

<div class="history-team ${winB?'win':'lose'}">
${h.teamB[0]} & ${h.teamB[1]}
</div>

<div class="history-score">
${h.scoreA} - ${h.scoreB}
</div>

</div>
`

}).reverse().join("")
}
</script>

</body>
</html>
