<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badminton Pro</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:linear-gradient(180deg,#0f172a,#1e293b);
color:white;
padding:20px;
}

h1{
text-align:center;
font-size:30px;
margin-bottom:25px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:20px;
border-radius:25px;
margin-bottom:20px;
box-shadow:0 8px 30px rgba(0,0,0,0.4);
}

textarea{
width:100%;
height:140px;
font-size:20px;
padding:15px;
border-radius:15px;
border:none;
outline:none;
}

button{
width:100%;
padding:18px;
font-size:20px;
border:none;
border-radius:18px;
margin-top:12px;
font-weight:bold;
color:white;
}

.start{background:#3b82f6;}
.next{background:#22c55e;}
.save{background:#f59e0b;}
.reset{background:#ef4444;}

.big{
font-size:38px;
text-align:center;
margin:20px 0;
font-weight:bold;
}

.vs{
text-align:center;
font-size:26px;
opacity:0.7;
}

.score-box{
display:flex;
gap:12px;
margin-top:10px;
}

.score-box input{
flex:1;
padding:15px;
font-size:26px;
border-radius:15px;
border:none;
text-align:center;
}

.rank-row{
display:flex;
justify-content:space-between;
padding:12px 10px;
margin-bottom:8px;
border-radius:15px;
background:rgba(255,255,255,0.06);
font-size:18px;
}

.gold{background:#facc15;color:black;font-weight:bold;}
.silver{background:#e5e7eb;color:black;font-weight:bold;}
.bronze{background:#f97316;color:black;font-weight:bold;}

.small{
font-size:14px;
opacity:0.8;
}
</style>
</head>

<body>

<h1>🏸 Tournament PRO</h1>

<div class="card">
<textarea id="players" placeholder="ใส่ชื่อ 8 คน (บรรทัดละ 1 คน)"></textarea>
<button class="start" onclick="startGame()">เริ่มใหม่</button>
<button class="next" onclick="nextRound()">สุ่มรอบถัดไป</button>
<button class="reset" onclick="resetAll()">ล้างทั้งหมด</button>
</div>

<div class="card">
<div id="round">รอบที่ 0</div>

<div class="big" id="teamA">-</div>
<div class="vs">VS</div>
<div class="big" id="teamB">-</div>

<div class="score-box">
<input type="number" id="scoreA" placeholder="แต้ม A">
<input type="number" id="scoreB" placeholder="แต้ม B">
</div>

<button class="save" onclick="saveScore()">บันทึกผล</button>
</div>

<div class="card">
<h3>🏆 ตารางคะแนน</h3>
<div id="ranking"></div>
</div>

<script>

let players=[]
let played={}
let wins={}
let consecutive={}
let usedPairs=new Set()
let waiting=[]
let round=0
let currentMatch=[]

function save(){
localStorage.setItem("badmintonPro",JSON.stringify({
players,played,wins,consecutive,
usedPairs:[...usedPairs],waiting,round,currentMatch
}))
}

function load(){
let data=localStorage.getItem("badmintonPro")
if(data){
let d=JSON.parse(data)
players=d.players
played=d.played
wins=d.wins
consecutive=d.consecutive
usedPairs=new Set(d.usedPairs)
waiting=d.waiting
round=d.round
currentMatch=d.currentMatch
updateUI()
updateRanking()
}
}
load()

function startGame(){
players=document.getElementById("players").value.trim().split("\n")
if(players.length!==8){alert("ต้องมี 8 คน");return}

played={}
wins={}
consecutive={}
usedPairs=new Set()
waiting=[...players]
round=0

players.forEach(p=>{
played[p]=0
wins[p]=0
consecutive[p]=0
})

save()
nextRound()
}

function shuffle(a){
return a.sort(()=>Math.random()-0.5)
}

function valid(a,b,c,d){
let p1=[a,b].sort().join("-")
let p2=[c,d].sort().join("-")
return !usedPairs.has(p1)&&!usedPairs.has(p2)
}

function nextRound(){
if(players.length!==8){alert("เริ่มเกมก่อน");return}

round++
let selected=[]

if(waiting.length>=4){
shuffle(waiting)
selected=waiting.splice(0,4)
}else{
let eligible=players.filter(p=>consecutive[p]<2)
shuffle(eligible)
selected=eligible.slice(0,4)
}

let tries=0
while(tries<50){
shuffle(selected)
if(valid(selected[0],selected[1],selected[2],selected[3])) break
tries++
}

currentMatch=selected

usedPairs.add([selected[0],selected[1]].sort().join("-"))
usedPairs.add([selected[2],selected[3]].sort().join("-"))

players.forEach(p=>{
if(selected.includes(p)){
played[p]++
consecutive[p]++
}else{
consecutive[p]=0
}
})

updateUI()
updateRanking()
save()
}

function saveScore(){
let sA=parseInt(scoreA.value)
let sB=parseInt(scoreB.value)

if(isNaN(sA)||isNaN(sB)){alert("ใส่คะแนนก่อน");return}

if(sA>sB){
wins[currentMatch[0]]++
wins[currentMatch[1]]++
}else if(sB>sA){
wins[currentMatch[2]]++
wins[currentMatch[3]]++
}

scoreA.value=""
scoreB.value=""

updateRanking()
save()
}

function updateUI(){
round.innerText="รอบที่ "+round
if(currentMatch.length===4){
teamA.innerHTML=currentMatch[0]+"<br>"+currentMatch[1]
teamB.innerHTML=currentMatch[2]+"<br>"+currentMatch[3]
}
}

function updateRanking(){
let sorted=[...players].sort((a,b)=>wins[b]-wins[a])
let html=""

sorted.forEach((p,i)=>{
let medal=""
if(i==0) medal="gold"
if(i==1) medal="silver"
if(i==2) medal="bronze"

html+=`
<div class="rank-row ${medal}">
<span>#${i+1} ${p}</span>
<span>
ชนะ ${wins[p]} | เล่น ${played[p]} รอบ
</span>
</div>
`
})

ranking.innerHTML=html
}

function resetAll(){
localStorage.removeItem("badmintonPro")
location.reload()
}

</script>

</body>
</html>
