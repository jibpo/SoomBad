<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badminton Scheduler</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont;
    background:#f4f6f9;
    padding:20px;
    margin:0;
}

h2{
    text-align:center;
}

.card{
    background:white;
    padding:20px;
    border-radius:18px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:140px;
    font-size:18px;
    padding:10px;
    border-radius:12px;
    border:1px solid #ddd;
}

button{
    width:100%;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:14px;
    margin-top:10px;
}

.primary{ background:#2d8cff; color:white; }
.secondary{ background:#34c759; color:white; }
.danger{ background:#ff3b30; color:white; }

.round{
    font-size:20px;
    text-align:center;
    margin-bottom:10px;
}

.match{
    font-size:22px;
    text-align:center;
    margin-top:10px;
}

.small{
    font-size:14px;
    color:#777;
    text-align:center;
    margin-top:8px;
}
</style>
</head>

<body>

<h2>🏸 Smart Bad Scheduler</h2>

<div class="card">
<textarea id="players" placeholder="ใส่ชื่อ 8 คน (บรรทัดละ 1 คน)"></textarea>
<button class="primary" onclick="startGame()">เริ่มเกมใหม่</button>
<button class="secondary" onclick="nextRound()">สุ่มรอบถัดไป</button>
<button class="danger" onclick="resetAll()">ล้างทั้งหมด</button>
</div>

<div class="card">
<div class="round" id="round">รอบที่ 0</div>
<div class="match" id="result">ยังไม่เริ่ม</div>
<div class="small">ครบทุกคนก่อน 1 รอบ | ไม่ซ้ำคู่ | ไม่เกิน 2 รอบติด</div>
</div>

<script>

let players=[]
let playedCount={}
let consecutive={}
let usedPairs=new Set()
let waiting=[]
let round=0

function save(){
localStorage.setItem("badSmart",JSON.stringify({
players,playedCount,consecutive,
usedPairs:[...usedPairs],waiting,round
}))
}

function load(){
let data=localStorage.getItem("badSmart")
if(data){
let d=JSON.parse(data)
players=d.players
playedCount=d.playedCount
consecutive=d.consecutive
usedPairs=new Set(d.usedPairs)
waiting=d.waiting
round=d.round
updateUI()
}
}
load()

function startGame(){
players=document.getElementById("players").value.trim().split("\n")
if(players.length!==8){alert("ต้องมี 8 คน");return}

playedCount={}
consecutive={}
usedPairs=new Set()
waiting=[...players]
round=0

players.forEach(p=>{
playedCount[p]=0
consecutive[p]=0
})

save()
nextRound()
}

function shuffle(a){
return a.sort(()=>Math.random()-0.5)
}

function valid(a,b,c,d){
let p1=[a,b].sort().join("-")
let p2=[c,d].sort().join("-")
return !usedPairs.has(p1)&&!usedPairs.has(p2)
}

function nextRound(){
if(players.length!==8){alert("กดเริ่มเกมก่อน");return}

round++

let selected=[]

if(waiting.length>=4){
shuffle(waiting)
selected=waiting.splice(0,4)
}else{
let eligible=players.filter(p=>consecutive[p]<2)
shuffle(eligible)
selected=eligible.slice(0,4)
}

let tries=0
while(tries<50){
shuffle(selected)
if(valid(selected[0],selected[1],selected[2],selected[3])) break
tries++
}

let a=selected[0]
let b=selected[1]
let c=selected[2]
let d=selected[3]

usedPairs.add([a,b].sort().join("-"))
usedPairs.add([c,d].sort().join("-"))

players.forEach(p=>{
if(selected.includes(p)){
playedCount[p]++
consecutive[p]++
}else{
consecutive[p]=0
}
})

document.getElementById("result").innerHTML=
`ทีม A<br><b>${a} & ${b}</b><br><br>ทีม B<br><b>${c} & ${d}</b>`

save()
updateUI()
}

function updateUI(){
document.getElementById("round").innerText="รอบที่ "+round
}

function resetAll(){
localStorage.removeItem("badSmart")
location.reload()
}

</script>
</body>
</html>
