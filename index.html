<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Badminton Match Board</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#0f172a;
color:white;
padding:16px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:16px;
border-radius:16px;
margin-bottom:16px;
}

textarea{
width:100%;
height:120px;
font-size:18px;
padding:10px;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:16px;
font-size:17px;
border:none;
border-radius:12px;
margin-top:8px;
font-weight:bold;
color:white;
}

.start{background:#2563eb;}
.next{background:#22c55e;}
.save{background:#f59e0b;}
.reset{background:#ef4444;}

.big{
font-size:32px;
text-align:center;
margin:16px 0;
font-weight:bold;
}

.vs{
text-align:center;
opacity:0.7;
}

.score-box{
display:flex;
gap:10px;
}

.score-box input{

width:50%;
height:70px;

font-size:32px;
font-weight:bold;

border-radius:12px;
border:none;

text-align:center;
}

.rank-card{

background:#334155;
padding:12px;

border-radius:12px;

margin-bottom:8px;

}

.rank-name{
font-size:18px;
font-weight:bold;
}

.rank-stats{
font-size:14px;
margin-top:6px;
}

.history-card{

background:#475569;

padding:10px;

border-radius:10px;

margin-bottom:8px;

font-size:14px;

}

</style>
</head>

<body>

<h1>🏸 Badminton Board</h1>

<div class="card">

<textarea id="players" placeholder="ใส่ชื่อ 8 คน (บรรทัดละ 1 คน)"></textarea>

<button class="start" onclick="startGame()">เริ่มเกม</button>
<button class="next" onclick="nextRound()">สุ่มรอบใหม่</button>
<button class="reset" onclick="resetAll()">รีเซ็ต</button>

</div>


<div class="card">

<h3>🏸 แมตช์ปัจจุบัน</h3>

<div id="round">รอบที่ 0</div>

<div class="big" id="teamA">-</div>

<div class="vs">VS</div>

<div class="big" id="teamB">-</div>

<div class="score-box">

<input type="number" id="scoreA" placeholder="A">

<input type="number" id="scoreB" placeholder="B">

</div>

<button class="save" onclick="saveScore()">บันทึกคะแนน</button>

</div>


<div class="card">

<h3>🏆 ตารางคะแนน</h3>

<div id="ranking"></div>

</div>


<div class="card">

<h3>📜 ประวัติการแข่งขัน</h3>

<div id="history"></div>

</div>


<script>

let players=[]
let played={}
let wins={}
let pointsFor={}
let pointsAgainst={}
let consecutive={}
let usedPairs=new Set()
let waiting=[]
let round=0
let currentMatch=[]
let history=[]

function save(){

localStorage.setItem("badmintonBoard",JSON.stringify({
players,played,wins,pointsFor,pointsAgainst,
consecutive,usedPairs:[...usedPairs],waiting,
round,currentMatch,history
}))

}

function load(){

let data=localStorage.getItem("badmintonBoard")

if(data){

let d=JSON.parse(data)

players=d.players
played=d.played
wins=d.wins
pointsFor=d.pointsFor
pointsAgainst=d.pointsAgainst
consecutive=d.consecutive
usedPairs=new Set(d.usedPairs)
waiting=d.waiting
round=d.round
currentMatch=d.currentMatch
history=d.history || []

updateUI()
updateRanking()
updateHistory()

}

}

load()

function startGame(){

players=document.getElementById("players").value.trim().split("\n")

if(players.length!==8){

alert("ต้องมี 8 คน")
return

}

played={}
wins={}
pointsFor={}
pointsAgainst={}
consecutive={}
usedPairs=new Set()

waiting=[...players]

round=0
history=[]

players.forEach(p=>{

played[p]=0
wins[p]=0
pointsFor[p]=0
pointsAgainst[p]=0
consecutive[p]=0

})

save()
nextRound()

}

function shuffle(a){

return a.sort(()=>Math.random()-0.5)

}

function valid(a,b,c,d){

let p1=[a,b].sort().join("-")
let p2=[c,d].sort().join("-")

return !usedPairs.has(p1)&&!usedPairs.has(p2)

}

function nextRound(){

round++

let selected=[]

if(waiting.length>=4){

shuffle(waiting)
selected=waiting.splice(0,4)

}else{

let eligible=players.filter(p=>consecutive[p]<2)

shuffle(eligible)
selected=eligible.slice(0,4)

}

let tries=0

while(tries<50){

shuffle(selected)

if(valid(selected[0],selected[1],selected[2],selected[3])) break

tries++

}

currentMatch=selected

usedPairs.add([selected[0],selected[1]].sort().join("-"))
usedPairs.add([selected[2],selected[3]].sort().join("-"))

players.forEach(p=>{

if(selected.includes(p)){
played[p]++
consecutive[p]++
}else{
consecutive[p]=0
}

})

updateUI()
updateRanking()

save()

}

function saveScore(){

let sA=parseInt(scoreA.value)
let sB=parseInt(scoreB.value)

if(isNaN(sA)||isNaN(sB)){
alert("ใส่คะแนนก่อน")
return
}

let [a,b,c,d]=currentMatch

pointsFor[a]+=sA
pointsFor[b]+=sA
pointsAgainst[a]+=sB
pointsAgainst[b]+=sB

pointsFor[c]+=sB
pointsFor[d]+=sB
pointsAgainst[c]+=sA
pointsAgainst[d]+=sA

if(sA>sB){
wins[a]++
wins[b]++
}else if(sB>sA){
wins[c]++
wins[d]++
}

history.unshift({

round:round,
teamA:[a,b],
teamB:[c,d],
scoreA:sA,
scoreB:sB

})

scoreA.value=""
scoreB.value=""

updateRanking()
updateHistory()

save()

}

function updateUI(){

round.innerText="รอบที่ "+round

if(currentMatch.length===4){

teamA.innerHTML=currentMatch[0]+"<br>"+currentMatch[1]
teamB.innerHTML=currentMatch[2]+"<br>"+currentMatch[3]

}

}

function updateRanking(){

let sorted=[...players].sort((a,b)=>{

if(wins[b]!==wins[a]) return wins[b]-wins[a]

let diffB=pointsFor[b]-pointsAgainst[b]
let diffA=pointsFor[a]-pointsAgainst[a]

return diffB-diffA

})

let html=""

sorted.forEach((p,i)=>{

let medal=""
if(i==0) medal="🥇"
if(i==1) medal="🥈"
if(i==2) medal="🥉"

let diff=pointsFor[p]-pointsAgainst[p]

html+=`

<div class="rank-card">

<div class="rank-name">${medal} #${i+1} ${p}</div>

<div class="rank-stats">

🏆 ชนะ ${wins[p]} | 🎮 เล่น ${played[p]} รอบ<br>

🎯 ${pointsFor[p]} ได้ | ❌ ${pointsAgainst[p]} เสีย | ➕ ${diff}

</div>

</div>

`

})

ranking.innerHTML=html

}

function updateHistory(){

let html=""

history.forEach(h=>{

html+=`

<div class="history-card">

<b>รอบ ${h.round}</b><br>

${h.teamA[0]} / ${h.teamA[1]}

<b>${h.scoreA}</b>

vs

<b>${h.scoreB}</b>

${h.teamB[0]} / ${h.teamB[1]}

</div>

`

})

history.innerHTML=html

}

function resetAll(){

localStorage.removeItem("badmintonBoard")
location.reload()

}

</script>

</body>
</html>
