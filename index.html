<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>โจ๋เรนเจอร์ On Court</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#0f172a;
color:white;
padding:16px;
}

h1{
text-align:center;
margin-bottom:20px;
font-size:28px;
}

.card{
background:#1e293b;
padding:16px;
border-radius:16px;
margin-bottom:16px;
}

textarea{
width:100%;
height:120px;
font-size:18px;
padding:10px;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:16px;
font-size:17px;
border:none;
border-radius:12px;
margin-top:8px;
font-weight:bold;
color:white;
}

.start{background:#2563eb;}
.next{background:#22c55e;}
.view{background:#64748b;}
.reset{background:#ef4444;}

.big{
font-size:32px;
text-align:center;
margin:16px 0;
font-weight:bold;
}

.vs{
text-align:center;
opacity:0.7;
}

.score-box{
display:flex;
gap:10px;
}

.score-box input{

width:50%;
height:70px;

font-size:32px;
font-weight:bold;

border-radius:12px;
border:none;

text-align:center;
}

.round-card{
background:#334155;
padding:12px;
border-radius:12px;
margin-bottom:8px;
}

.history-card{
background:#475569;
padding:10px;
border-radius:10px;
margin-bottom:8px;
font-size:14px;
}

</style>
</head>

<body>

<h1>🏸 โจ๋เรนเจอร์ On Court</h1>

<div class="card">

<textarea id="players" placeholder="ใส่ชื่อ 8 คน (บรรทัดละ 1 คน)"></textarea>

<button class="start" onclick="startGame()">เริ่มเกม</button>
<button class="next" onclick="nextRound()">รอบถัดไป</button>
<button class="reset" onclick="resetAll()">รีเซ็ต</button>

</div>


<div class="card">

<h3>🏸 แมตช์ปัจจุบัน</h3>

<div id="round">รอบที่ 0</div>

<div class="big" id="teamA">-</div>

<div class="vs">VS</div>

<div class="big" id="teamB">-</div>

<div class="score-box">

<input type="number" id="scoreA" placeholder="A">
<input type="number" id="scoreB" placeholder="B">

</div>

<button class="view" onclick="viewLast()">ดูรอบก่อนหน้า</button>

</div>


<div class="card">

<h3>🎮 จำนวนรอบที่เล่น</h3>

<div id="roundTable"></div>

</div>


<div class="card">

<h3>📜 ประวัติการแข่งขัน</h3>

<div id="history"></div>

</div>


<script>

let players=[]
let played={}
let round=0
let currentMatch=[]
let history=[]

function save(){

localStorage.setItem("badmintonSmart",JSON.stringify({
players,played,round,currentMatch,history
}))

}

function load(){

let data=localStorage.getItem("badmintonSmart")

if(data){

let d=JSON.parse(data)

players=d.players
played=d.played
round=d.round
currentMatch=d.currentMatch
history=d.history || []

updateUI()
updateRounds()
updateHistory()

}

}

load()

function startGame(){

players=document.getElementById("players").value.trim().split("\n")

if(players.length!==8){
alert("ต้องมี 8 คน")
return
}

played={}

players.forEach(p=>{
played[p]=0
})

round=0
history=[]

save()

nextRound()

}

function nextRound(){

round++

let sorted=[...players].sort((a,b)=>played[a]-played[b])

let selected=sorted.slice(0,4)

currentMatch=selected

selected.forEach(p=>{
played[p]++
})

history.unshift({
round:round,
teamA:[selected[0],selected[1]],
teamB:[selected[2],selected[3]]
})

updateUI()
updateRounds()
updateHistory()

save()

}

function viewLast(){

if(history.length<2){

alert("ยังไม่มีรอบก่อนหน้า")

return

}

let last=history[1]

alert(
"รอบ "+last.round+"\n\n"+
last.teamA[0]+" / "+last.teamA[1]+
"\nVS\n"+
last.teamB[0]+" / "+last.teamB[1]
)

}

function updateUI(){

round.innerText="รอบที่ "+round

if(currentMatch.length===4){

teamA.innerHTML=currentMatch[0]+"<br>"+currentMatch[1]
teamB.innerHTML=currentMatch[2]+"<br>"+currentMatch[3]

}

}

function updateRounds(){

let html=""

players.forEach(p=>{

html+=`

<div class="round-card">

<b>${p}</b><br>

🎮 เล่นไปแล้ว <b>${played[p]}</b> รอบ

</div>

`

})

document.getElementById("roundTable").innerHTML=html

}

function updateHistory(){

let html=""

history.forEach(h=>{

html+=`

<div class="history-card">

<b>รอบ ${h.round}</b><br>

${h.teamA[0]} / ${h.teamA[1]}

VS

${h.teamB[0]} / ${h.teamB[1]}

</div>

`

})

document.getElementById("history").innerHTML=html

}

function resetAll(){

localStorage.removeItem("badmintonSmart")
location.reload()

}

</script>

</body>
</html>
