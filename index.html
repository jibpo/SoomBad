<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badminton Match</title>

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont;
background:#e5e7eb;
padding:16px;
}

/* header */
.header{
background:#1e3a8a;
color:white;
padding:20px;
border-radius:20px;
margin-bottom:16px;
}

/* container card */
.card{
background:white;
border-radius:20px;
padding:14px;
margin-bottom:12px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

/* textarea */
textarea{
width:100%;
height:100px;
border-radius:14px;
padding:10px;
border:none;
background:#f3f4f6;
}

/* buttons */
button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:14px;
font-weight:600;
}

button:nth-child(2){ background:#1e3a8a; color:white; }
button:nth-child(3){ background:#22c55e; color:white; }
button:nth-child(4){ background:#ef4444; color:white; }

/* match */
.match{
background:#dbeafe;
border-radius:18px;
padding:12px;
text-align:center;
margin-top:10px;
}

.big{
font-size:22px;
font-weight:700;
margin:6px 0;
}

.vs{
color:#64748b;
}

/* scoreboard btn */
.start{
background:#1e3a8a;
color:white;
border-radius:20px;
padding:12px;
margin-top:10px;
}

/* ranking cards */
.rank{
background:#f3f4f6;
border-radius:18px;
padding:12px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.rank.top1{ background:#fde68a; }
.rank.top2{ background:#e5e7eb; }
.rank.top3{ background:#fed7aa; }

/* history */
.history-card{
background:#f9fafb;
border-radius:18px;
padding:12px;
margin-top:10px;
}

.history-score{
font-weight:bold;
text-align:right;
margin-top:6px;
}

.win{ color:#16a34a; }
.lose{ color:#9ca3af; }
</style>
</head>

<body>
<div class="header">
<h2 style="margin:0;">What’s new?</h2>
<div style="font-size:13px; opacity:0.8;">Badminton Match</div>
</div>
<div class="card">

<textarea id="players" placeholder="ใส่ชื่อ"></textarea>

<button onclick="startGame()">เริ่มใหม่</button>
<button onclick="nextRound()">สุ่มรอบ</button>
<button onclick="resetAll()">รีเซ็ต</button>

<div class="match">
<div id="round">รอบที่ 0</div>

<div class="big" id="teamA">-</div>
<div class="vs">VS</div>
<div class="big" id="teamB">-</div>
</div>

<button class="start" onclick="openScoreboard()">เริ่มแข่ง</button>

</div>

<div class="card" style="background:#eff6ff;">
<div id="round">รอบที่ 0</div>

<div class="big" id="teamA">-</div>
<div class="vs">VS</div>
<div class="big" id="teamB">-</div>

<button onclick="openScoreboard()">เริ่มแข่ง</button>
</div>

<div class="card">
<h3>🏆 ตารางคะแนน</h3>
<div id="ranking"></div>
</div>

<div class="card">
<h3>📜 ประวัติการแข่งขัน</h3>
<div id="history"></div>
</div>

<script>

const roundEl = document.getElementById("round")
const teamAEl = document.getElementById("teamA")
const teamBEl = document.getElementById("teamB")
const rankingEl = document.getElementById("ranking")
const historyEl = document.getElementById("history")

let players=[]
let played={},wins={},pf={},pa={},consecutive={}
let usedPairs=new Set()
let currentMatch=[]
let round=0
let history=[]

function save(){
localStorage.setItem("bad_full",JSON.stringify({
players,played,wins,pf,pa,consecutive,
usedPairs:[...usedPairs],currentMatch,round,history
}))
}

function load(){
let d=JSON.parse(localStorage.getItem("bad_full")||"null")
if(!d)return
players=d.players
played=d.played
wins=d.wins
pf=d.pf
pa=d.pa
consecutive=d.consecutive
usedPairs=new Set(d.usedPairs)
currentMatch=d.currentMatch
round=d.round
history=d.history||[]
updateUI()
updateRank()
updateHistory()
}
load()

function startGame(){
players=document.getElementById("players").value.trim().split("\n").filter(x=>x)

if(players.length<4){alert("ต้องมีอย่างน้อย 4 คน");return}

played={},wins={},pf={},pa={},consecutive={}
usedPairs=new Set()
history=[]
round=0

players.forEach(p=>{
played[p]=0
wins[p]=0
pf[p]=0
pa[p]=0
consecutive[p]=0
})

nextRound()
}

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function valid(a,b,c,d){
return !usedPairs.has([a,b].sort().join("-")) &&
       !usedPairs.has([c,d].sort().join("-"))
}

function pickPlayers(){

let eligible = players.filter(p=>consecutive[p]<2)
if(eligible.length<4) eligible=[...players]

eligible.sort((a,b)=>played[a]-played[b])

let pool = eligible.slice(0,Math.min(6,eligible.length))
if(pool.length<4) pool=[...players]

for(let i=0;i<50;i++){
let s = shuffle([...pool]).slice(0,4)
if(s.length===4 && valid(s[0],s[1],s[2],s[3])) return s
}

return shuffle([...players]).slice(0,4)
}

function nextRound(){
round++
let s = pickPlayers()
currentMatch=s

if(s.length<4)return

usedPairs.add([s[0],s[1]].sort().join("-"))
usedPairs.add([s[2],s[3]].sort().join("-"))

players.forEach(p=>{
if(s.includes(p)){
played[p]++
consecutive[p]++
}else{
consecutive[p]=0
}
})

updateUI()
updateRank()
save()
}

function openScoreboard(){
window.open("scoreboard.html","_blank")
}

function resetAll(){
localStorage.removeItem("bad_full")
location.reload()
}

function updateUI(){
if(currentMatch.length<4){
teamAEl.innerHTML="-"
teamBEl.innerHTML="-"
return
}
roundEl.innerText="รอบที่ "+round
teamAEl.innerHTML=currentMatch[0]+"<br>"+currentMatch[1]
teamBEl.innerHTML=currentMatch[2]+"<br>"+currentMatch[3]
}

function updateRank(){

let sorted=[...players].sort((a,b)=>{
if(wins[b]!=wins[a]) return wins[b]-wins[a]
return (pf[b]-pa[b])-(pf[a]-pa[a])
})

rankingEl.innerHTML=sorted.map((p,i)=>{

let cls="rank"
if(i===0) cls+=" top1"
if(i===1) cls+=" top2"
if(i===2) cls+=" top3"

return `
<div class="${cls}">
<div>#${i+1} ${p}</div>
<div>🏆 ${wins[p]}</div>
</div>
`
}).join("")
}

function updateHistory(){

historyEl.innerHTML = history.map(h=>{

return `
<div class="history-card">

<div>
${h.teamA[0]} & ${h.teamA[1]}
</div>

<div style="text-align:center;">vs</div>

<div>
${h.teamB[0]} & ${h.teamB[1]}
</div>

<div class="history-score">
${h.scoreA} - ${h.scoreB}
</div>

</div>
`

}).reverse().join("")
}
</script>

</body>
</html>
