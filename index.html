<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Badminton Match Maker</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

button{
width:100%;
padding:18px;
margin:10px 0;
border:none;
border-radius:16px;
font-size:20px;
font-weight:bold;
}

.primary{
background:#22c55e;
color:white;
}

.scoreBtn{
background:#3b82f6;
color:white;
}

.reset{
background:#ef4444;
color:white;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.team{
font-size:26px;
margin:10px 0;
}

input{
width:70px;
font-size:24px;
text-align:center;
border-radius:10px;
border:none;
padding:8px;
margin:10px;
}

.rank{
text-align:left;
margin-top:10px;
font-size:18px;
}

.playerRow{
background:#334155;
padding:10px;
border-radius:12px;
margin:6px 0;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<h1>🏸 Badminton Match</h1>

<button class="primary" onclick="nextMatch()">สุ่มแมตช์ใหม่</button>

<div class="card">
<div id="match"></div>

<div style="margin-top:15px">
<input id="scoreA" placeholder="0">
<span style="font-size:24px">:</span>
<input id="scoreB" placeholder="0">
</div>

<button class="scoreBtn" onclick="saveScore()">บันทึกคะแนน</button>
</div>

<div class="card">
<h2>🏆 ตารางคะแนน</h2>
<div id="ranking"></div>
</div>

<button class="reset" onclick="resetAll()">รีเซ็ตทั้งหมด</button>

<script>

let players=[
"A","B","C","D","E","F","G","H"
]

let played=JSON.parse(localStorage.getItem("played"))||{}
let wins=JSON.parse(localStorage.getItem("wins"))||{}
let pointsFor=JSON.parse(localStorage.getItem("pf"))||{}
let pointsAgainst=JSON.parse(localStorage.getItem("pa"))||{}

players.forEach(p=>{
played[p]=played[p]||0
wins[p]=wins[p]||0
pointsFor[p]=pointsFor[p]||0
pointsAgainst[p]=pointsAgainst[p]||0
})

let currentMatch=null

function shuffle(a){
return a.sort(()=>Math.random()-0.5)
}

function nextMatch(){

let sorted=[...players].sort((a,b)=>played[a]-played[b])

let choose=sorted.slice(0,4)

shuffle(choose)

let teamA=[choose[0],choose[1]]
let teamB=[choose[2],choose[3]]

currentMatch={teamA,teamB}

document.getElementById("match").innerHTML=`
<div class="team">🔵 ${teamA[0]} + ${teamA[1]}</div>
<div class="team">🔴 ${teamB[0]} + ${teamB[1]}</div>
`

document.getElementById("scoreA").value=""
document.getElementById("scoreB").value=""

}

function saveScore(){

if(!currentMatch)return

let a=parseInt(scoreA.value)
let b=parseInt(scoreB.value)

if(isNaN(a)||isNaN(b))return

let {teamA,teamB}=currentMatch

teamA.forEach(p=>{
played[p]++
pointsFor[p]+=a
pointsAgainst[p]+=b
})

teamB.forEach(p=>{
played[p]++
pointsFor[p]+=b
pointsAgainst[p]+=a
})

if(a>b) teamA.forEach(p=>wins[p]++)
if(b>a) teamB.forEach(p=>wins[p]++)

localStorage.setItem("played",JSON.stringify(played))
localStorage.setItem("wins",JSON.stringify(wins))
localStorage.setItem("pf",JSON.stringify(pointsFor))
localStorage.setItem("pa",JSON.stringify(pointsAgainst))

updateRanking()

}

function updateRanking(){

let rank=[...players]

rank.sort((a,b)=>{

if(wins[b]!=wins[a]) return wins[b]-wins[a]

return (pointsFor[b]-pointsAgainst[b])-(pointsFor[a]-pointsAgainst[a])

})

let html=""

rank.forEach((p,i)=>{

html+=`
<div class="playerRow">
<div>${i+1}. ${p}</div>
<div>🏆${wins[p]} | 🎮${played[p]}</div>
</div>
`

})

ranking.innerHTML=html

}

function resetAll(){

localStorage.clear()
location.reload()

}

updateRanking()

</script>

</body>
</html>
